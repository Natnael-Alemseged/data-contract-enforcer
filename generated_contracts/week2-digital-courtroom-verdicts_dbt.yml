version: 2
models:
- name: week2_digital_courtroom_verdicts
  description: dbt model for week2-digital-courtroom-verdicts
  columns:
  - name: verdict_id
    tests:
    - not_null
    - accepted_values:
        values:
        - ace14a9e-a35c-4524-a8dd-0324cf331222
    - unique
  - name: target_ref
    tests:
    - not_null
    - accepted_values:
        values:
        - https://github.com/Natnael-Alemseged/Github-Evaluator
  - name: rubric_id
    tests:
    - not_null
    - unique
  - name: rubric_version
    tests:
    - not_null
    - accepted_values:
        values:
        - 3.0.0
  - name: overall_verdict
    tests:
    - not_null
    - accepted_values:
        values:
        - PASS
  - name: overall_score
    tests:
    - not_null
    - dbt_expectations.expect_column_values_to_be_between:
        min_value: 0
  - name: confidence
    tests:
    - not_null
    - dbt_expectations.expect_column_values_to_be_between:
        min_value: 0.0
        max_value: 1.0
  - name: evaluated_at
    tests:
    - not_null
