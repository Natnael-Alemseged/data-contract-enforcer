version: 2
models:
- name: langsmith_trace_records
  description: dbt model for langsmith-trace-records
  columns:
  - name: id
    tests:
    - not_null
  - name: name
    tests:
    - not_null
    - accepted_values:
        values:
        - audit_chain
        - document_extraction_chain
        - entity_resolution_chain
        - fact_triage_chain
        - query_agent
  - name: run_type
    tests:
    - not_null
    - accepted_values:
        values:
        - chain
        - embedding
        - llm
        - retriever
        - tool
  - name: error
    tests:
    - accepted_values:
        values:
        - 'RateLimitError: quota exceeded'
  - name: start_time
    tests:
    - not_null
  - name: end_time
    tests:
    - not_null
  - name: total_tokens
    tests:
    - not_null
    - dbt_expectations.expect_column_values_to_be_between:
        min_value: 0
  - name: prompt_tokens
    tests:
    - not_null
    - dbt_expectations.expect_column_values_to_be_between:
        min_value: 0
  - name: completion_tokens
    tests:
    - not_null
    - dbt_expectations.expect_column_values_to_be_between:
        min_value: 0
  - name: total_cost
    tests:
    - not_null
    - dbt_expectations.expect_column_values_to_be_between:
        min_value: 0
  - name: parent_run_id
    tests:
    - accepted_values:
        values:
        - 20754091-8cc5-4ce5-a4b2-5a66a6542c49
        - 3cda2768-72cb-448b-b887-6053f1a618ee
        - 4ff92559-9734-448b-b838-e3a7932af70a
        - 8b982257-2e0b-4d81-af5f-ee51c964cd41
        - dc77894f-2ac6-47aa-b625-ec0f3da02570
    - unique
  - name: session_id
    tests:
    - not_null
    - accepted_values:
        values:
        - 63ab5f41-2a51-468c-ac7b-b53c200bb1b0
    - unique
  - name: inputs_input
    tests:
    - accepted_values:
        values:
        - '...'
  - name: outputs_output
    tests:
    - accepted_values:
        values:
        - '...'
  - name: inputs_prompt
    tests:
    - accepted_values:
        values:
        - '...'
  - name: outputs_text
    tests:
    - accepted_values:
        values:
        - '...'
