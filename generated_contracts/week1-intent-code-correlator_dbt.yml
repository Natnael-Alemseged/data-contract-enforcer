version: 2
models:
- name: week1_intent_code_correlator
  description: dbt model for week1-intent-code-correlator
  columns:
  - name: intent_id
    tests:
    - not_null
    - unique
  - name: description
    tests:
    - not_null
  - name: created_at
    tests:
    - not_null
  - name: code_refs_file
    tests:
    - not_null
  - name: code_refs_line_start
    tests:
    - not_null
    - dbt_expectations.expect_column_values_to_be_between:
        min_value: 0
  - name: code_refs_line_end
    tests:
    - not_null
    - dbt_expectations.expect_column_values_to_be_between:
        min_value: 0
  - name: code_refs_symbol
    tests:
    - not_null
  - name: code_refs_confidence
    tests:
    - not_null
    - dbt_expectations.expect_column_values_to_be_between:
        min_value: 0.0
        max_value: 1.0
