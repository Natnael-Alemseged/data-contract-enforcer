# contract_registry/subscriptions.yaml
# =====================================
# Consumer dependency registry for the Data Contract Enforcer.
# Every inter-system data dependency must be listed here.
# A subscription is a consumer's formal declaration of dependency.
#
# Blast radius uses this registry as the PRIMARY source.
# The lineage graph enriches with transitive depth — it does not replace this.

subscriptions:
  # ── Week 3 → Week 4 ────────────────────────────────────────────────────────
  - contract_id: week3-document-refinery-extractions
    subscriber_id: week4-cartographer
    subscriber_team: week4
    fields_consumed: [doc_id, extracted_facts, extraction_model]
    breaking_fields:
      - field: extracted_facts.confidence
        reason: used for node ranking; scale change (0.0-1.0 vs 0-100) breaks ordering logic
      - field: doc_id
        reason: primary key used as node identity in lineage graph
    validation_mode: ENFORCE
    registered_at: '2025-01-10T09:00:00Z'
    contact: week4-team@org.com

  # ── Week 3 → Week 7 (Enforcer) ─────────────────────────────────────────────
  - contract_id: week3-document-refinery-extractions
    subscriber_id: week7-enforcer
    subscriber_team: week7
    fields_consumed: [extracted_facts.confidence, doc_id, extracted_facts.text]
    breaking_fields:
      - field: extracted_facts.confidence
        reason: AI extension embedding drift check baseline; statistical drift detection
      - field: extracted_facts.text
        reason: embedding drift baseline computed from text values
    validation_mode: AUDIT
    registered_at: '2025-01-13T09:00:00Z'
    contact: week7-team@org.com

  # ── Week 4 → Week 7 (Enforcer) ─────────────────────────────────────────────
  - contract_id: week4-brownfield-cartographer
    subscriber_id: week7-enforcer
    subscriber_team: week7
    fields_consumed: [nodes, edges, snapshot_id, git_commit]
    breaking_fields:
      - field: edges
        reason: lineage traversal for blame chain depends on edge structure and relationship types
      - field: nodes
        reason: node_id format used as key for BFS traversal in ViolationAttributor
    validation_mode: ENFORCE
    registered_at: '2025-01-10T09:00:00Z'
    contact: week7-team@org.com

  # ── Week 5 → Week 7 (Enforcer) ─────────────────────────────────────────────
  - contract_id: week5-axiom-ledger-events
    subscriber_id: week7-enforcer
    subscriber_team: week7
    fields_consumed: [event_id, event_type, aggregate_id, stream_position, payload, occurred_at, recorded_at]
    breaking_fields:
      - field: event_type
        reason: payload validation dispatches on event_type; unknown types bypass schema checks
      - field: payload
        reason: event-type-specific schema validation depends on payload structure
      - field: occurred_at
        reason: temporal ordering constraint (recorded_at >= occurred_at) uses this field
    validation_mode: ENFORCE
    registered_at: '2025-01-10T09:00:00Z'
    contact: week7-team@org.com

  # ── LangSmith → Week 7 (Enforcer) ──────────────────────────────────────────
  - contract_id: langsmith-trace-records
    subscriber_id: week7-enforcer
    subscriber_team: week7
    fields_consumed: [id, run_type, total_tokens, prompt_tokens, completion_tokens, start_time, end_time]
    breaking_fields:
      - field: total_tokens
        reason: token arithmetic check (total = prompt + completion) depends on this field
      - field: run_type
        reason: trace schema enforcement filters by run_type enum values
    validation_mode: AUDIT
    registered_at: '2025-01-13T09:00:00Z'
    contact: week7-team@org.com
